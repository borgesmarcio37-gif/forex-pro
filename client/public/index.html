<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#03060e" />
    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Forex Pro" />
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <!-- PWA Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Forex Master Pro — Análise profissional com dados reais" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Forex Master Pro</title>
    <style>body{margin:0;background:#03060e;}</style>
  </head>
  <body>
    <noscript>Necessitas de JavaScript para utilizar esta aplicação.</noscript>
    <div id="root"></div>
    <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(r => console.log("[PWA] Service Worker registered"))
          .catch(e => console.warn("[PWA] SW registration failed:", e));
      });
    }
  </script>
</body>
</html>
